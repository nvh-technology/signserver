    public static string ByteArrayToString(byte[] ba)
    {
        StringBuilder stringBuilder = new StringBuilder(ba.Length * 2);
        foreach (byte b in ba)
        {
            stringBuilder.AppendFormat("{0:x2}", b);
        }

        return stringBuilder.ToString();
    }

